<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sofia — Client Photos</title>
<style>
  :root{--dark:#0D0D0D;--dark2:#161613;--gold:#C8A96E;--text:#F5F0E8;--muted:#9a9488}
  *{box-sizing:border-box}
  body{background:var(--dark);color:var(--text);font-family:'DM Sans',Arial,sans-serif;margin:0;padding:2rem}
  h1{font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:1.5rem}
  #login{max-width:360px;margin:4rem auto;text-align:center}
  input{width:100%;padding:0.8rem;background:var(--dark2);border:1px solid rgba(200,169,110,0.3);color:var(--text);border-radius:6px;margin-bottom:1rem;font-size:1rem}
  button{background:var(--gold);color:var(--dark);border:none;padding:0.8rem 1.5rem;border-radius:6px;font-weight:700;cursor:pointer;font-size:1rem}
  #error{color:#e88;margin-top:0.5rem;font-size:0.85rem}
  #gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.2rem}
  .card{background:var(--dark2);border:1px solid rgba(200,169,110,0.15);border-radius:8px;overflow:hidden}
  .card img{width:100%;height:200px;object-fit:cover;display:block}
  .card .info{padding:0.8rem}
  .card .info strong{display:block;font-size:0.95rem;margin-bottom:0.3rem}
  .card .info span{display:block;font-size:0.78rem;color:var(--muted)}
  #empty{color:var(--muted);text-align:center;margin-top:3rem}
</style>
</head>
<body>

<div id="login">
  <h1>Sofia — Client Photos</h1>
  <input type="password" id="pw" placeholder="Password">
  <button onclick="login()">Enter</button>
  <div id="error"></div>
</div>

<div id="content" style="display:none">
  <h1>Client Photos</h1>
  <div id="gallery"></div>
  <div id="empty" style="display:none">No photos uploaded yet.</div>
</div>

<script>
function login(){
  var pw = document.getElementById('pw').value;
  fetch('/.netlify/functions/list-photos', { headers: { 'x-admin-password': pw } })
    .then(function(r){ if(!r.ok) throw new Error('bad'); return r.json(); })
    .then(function(data){
      sessionStorage.setItem('sofia_pw', pw);
      document.getElementById('login').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      renderPhotos(data.photos, pw);
    })
    .catch(function(){
      document.getElementById('error').textContent = 'Incorrect password';
    });
}

function renderPhotos(photos, pw){
  var gallery = document.getElementById('gallery');
  if(!photos || photos.length === 0){
    document.getElementById('empty').style.display = 'block';
    return;
  }
  photos.forEach(function(p){
    var card = document.createElement('div');
    card.className = 'card';
    var img = document.createElement('img');
    img.src = '/.netlify/functions/get-photo?key=' + encodeURIComponent(p.key) + '&password=' + encodeURIComponent(pw);
    var info = document.createElement('div');
    info.className = 'info';
    var date = new Date(p.uploadedAt).toLocaleString();
    info.innerHTML = '<strong>' + (p.leadName || 'Unknown') + '</strong>' +
      '<span>' + (p.leadPhone || p.leadEmail || '') + '</span>' +
      '<span>' + date + '</span>';
    card.appendChild(img);
    card.appendChild(info);
    gallery.appendChild(card);
  });
}

// Auto-login if password already saved this session
var saved = sessionStorage.getItem('sofia_pw');
if(saved){
  document.getElementById('pw').value = saved;
  login();
}

document.getElementById('pw').addEventListener('keydown', function(e){
  if(e.key === 'Enter') login();
});
</script>

</body>
</html>
